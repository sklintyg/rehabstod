application:
  dir: /deployments

app:
  security:
    hash-salt: "${HASH_SALT}"
    aes-encryption-key: "${AES_ENCRYPTION_KEY}"
  pdl:
    system-id: SE5565594230-BD5
    system-name: "Rehabstöd"
  saml:
    base-url: "https://${app.domain-name}"
    login-success-url: "${app.saml.base-url}/"
    login-success-url-always-use: true
    logout-success-url: "${app.saml.base-url}/"
    sp:
      entity-id: "${app.saml.base-url}/saml2/service-provider-metadata/siths"
      assertion-consumer-service-location: "${app.saml.base-url}/login/saml2/sso/siths"
      single-logout-service-location: "${app.saml.base-url}/logout/saml2/slo"
      single-logout-service-response-location: "${app.saml.base-url}/logout/saml2/slo"
    keystore:
      type: PKCS12
      password: "${SAML_KEYSTORE_PASSWORD}"
  ntjp:
    certificate:
      file: "file://${application.dir}/certifikat/ntjp.certificate.jks"
      type: JKS
      password: "${NTJP_CERTIFICATE_PASSWORD}"
    key-manager-password: "${NTJP_KEY_MANAGER_PASSWORD}"
    truststore:
      file: "file://${application.dir}/certifikat/ntjp.truststore.jks"
      type: JKS
      password: "${NTJP_TRUSTSTORE_PASSWORD}"
  cache:
    default-expiry-seconds: 86400
    employee-name-expiry-seconds: 86400
    intygsadmin-expiry-seconds: 86400
    hsa-employee-expiry-seconds: 60
    hsa-health-care-unit-expiry-seconds: 60
    hsa-health-care-unit-members-expiry-seconds: 60
    hsa-unit-expiry-seconds: 60
    hsa-health-care-provider-expiry-seconds: 60
  resources:
    authorities-configuration-file: "classpath:authorities.yaml"
    dynamic-links-file: "classpath:/links/rehabstod.links.json"
    diagnoskapitel-file: "classpath:/diagnoskoder/diagnoskapitel.txt"
    diagnosgrupper-file: "classpath:/diagnoskoder/diagnosgrupper.txt"
    diagnoskod-ksh97p-file: "classpath:/diagnoskoder/KSH97P_KOD.ANS"
    diagnosis-code-icd10se-file: "classpath:/diagnoskoder/icd10se/icd-10-se.tsv"
    max-aliases-for-collections: 500
  integration:
    intygstjanst:
      scheme: http
      port: 8081
      host-url: "${app.integration.intygstjanst.scheme}://${app.integration.intygstjanst.base-url}:${app.integration.intygstjanst.port}"
      list-sick-leaves-for-person-url: "${app.integration.intygstjanst.host-url}/inera-certificate/list-sick-leaves-for-person/v1.0"
      service:
        connection-timeout: 15000
        receive-timeout: 60000
      rest:
        connection-request-timeout: 15000
        connection-timeout: 15000
    webcert:
      scheme: http
      port: 8081
      get-additions-max-age-days: 90
    srs:
      connection-timeout: 5000
      receive-timeout: 5000
    sparrtjanst:
      check-blocks-url: "${app.ntjp.base-url}/informationsecurity/authorization/blocking/CheckBlocks/4/rivtabp21"
      connection-timeout: 10000
      receive-timeout: 30000
    samtyckestjanst:
      check-consent-url: "${app.ntjp.base-url}/informationsecurity/authorization/consent/CheckConsent/2/rivtabp21"
      register-extended-consent-url: "${app.ntjp.base-url}/informationsecurity/authorization/consent/RegisterExtendedConsent/2/rivtabp21"
      connection-timeout: 10000
      receive-timeout: 30000
    intygsadmin:
      cron: "0 * * * * ?"
      cache-expiry-seconds: 86400
    intyg-proxy-service:
      credential-information-for-person-endpoint: /api/v1/credentialinformation
      employee-endpoint: /api/v2/employee
      health-care-unit-endpoint: /api/v2/healthcareunit
      health-care-unit-members-endpoint: /api/v2/healthcareunitmembers
      unit-endpoint: /api/v1/unit
      person-endpoint: /api/v1/person
      persons-endpoint: /api/v1/persons

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: rehabstod
        environment: "${spring.profiles.active:default}"
  level:
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR

spring:
  autoconfigure:
    exclude: org.springframework.boot.actuate.autoconfigure.metrics.jdbc.DataSourcePoolMetricsAutoConfiguration
  datasource:
    url: "jdbc:mysql://${DB_SERVER}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=Europe/Stockholm&allowPublicKeyRetrieval=true"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 3
      connection-timeout: 3000
      idle-timeout: 15000
      auto-commit: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        id:
          new_generator_mappings: false
  liquibase:
    change-log: classpath:changelog/changelog.xml
  data:
    redis:
      timeout: 60s

management:
  server:
    port: 8082
  endpoints:
    web:
      exposure:
        include: health,info
